<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Special Date Ticket</title>
    <!-- Menghubungkan ke file CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- FORM INPUT -->
    <div class="container" id="formContainer">
        <h1>Buat Tiket Kencan</h1>
        <p class="subtitle">Isi detail di bawah !</p>
        
        <div class="form-group">
            <label for="partnerName">Nama Kamu / Pasangan</label>
            <input type="text" id="partnerName" placeholder="Masukkan nama mu sayang..." required>
        </div>

        <div class="form-group">
            <label for="dateValue">Pilih Tanggal</label>
            <input type="date" id="dateValue" required>
        </div>

        <!-- Tambahan Form Input Waktu -->
        <div class="form-group row-inputs">
            <div style="flex: 2;">
                <label for="timeValue">Jam Kencan</label>
                <input type="time" id="timeValue" value="16:00" required>
            </div>
            <div style="flex: 1;">
                <label for="timezone">Zona</label>
                <select id="timezone">
                    <option value="WIB">WIB</option>
                    <option value="WITA">WITA</option>
                    <option value="WIT">WIT</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="activity">Rencana Aktivitas</label>
            <select id="activity">
                <option value="Nonton Bioskop & Makan Malam">🎬 Nonton Bioskop & Makan Malam</option>
                <option value="Deep Talk di Coffee Shop">☕ Deep Talk di Coffee Shop Nyaman</option>
                <option value="Jalan-jalan & Nyore di Pantai">🌊 Jalan-jalan & Nyore di Pantai</option>
                <option value="Piknik Estetik di Taman">🧺 Piknik Estetik di Taman</option>
                <option value="Keliling Kota & Berburu Street Food">🛵 Keliling Kota & Berburu Kuliner</option>
            </select>
        </div>

        <button class="btn" onclick="generateTicket()">Cetak Tiket Kencan ✨</button>
    </div>

    <!-- TAMPILAN TIKET -->
    <div class="ticket-wrapper" id="ticketWrapper">
        <div class="ticket" id="ticketContent">
            <!-- Bagian Utama -->
            <div class="ticket-main">
                <span class="ticket-badge">Couples Pass</span>
                <div class="ticket-title">Voucher Kencan Spesial</div>
                
                <div class="ticket-info-row">
                    <div class="ticket-info-item">
                        <div class="info-label">Spesial Untuk</div>
                        <div class="info-value" id="lblTarget">Nama Pasangan</div>
                    </div>
                </div>

                <div class="ticket-info-row">
                    <div class="ticket-info-item">
                        <div class="info-label">Tanggal</div>
                        <div class="info-value" id="lblDate">-</div>
                    </div>
                    <div class="ticket-info-item">
                        <div class="info-label">Waktu</div>
                        <!-- ID diganti untuk kustomisasi JS -->
                        <div class="info-value" id="lblTime">-</div>
                    </div>
                </div>

                <div class="ticket-info-row">
                    <div class="ticket-info-item">
                        <div class="info-label">Agenda Kegiatan</div>
                        <div class="info-value" id="lblActivity">-</div>
                    </div>
                </div>
            </div>

            <!-- Bagian Potongan Tiket (Stub) -->
            <div class="ticket-stub">
                <div class="info-label" style="color: #ffeef2;">Ticket Code</div>
                <div style="font-weight: bold; font-size: 0.9rem;" id="lblCode">DATE-0000</div>
                <div class="stub-title">ADMIT ONE</div>
                <div class="barcode"></div>
            </div>
        </div>

        <!-- Tombol Aksi -->
        <div class="action-btns">
            <button class="btn btn-secondary" onclick="resetForm()">Buat Baru</button>
            <button class="btn" onclick="window.print()">Simpan / Screenshot </button>
        </div>
    </div>

    <!-- Menghubungkan ke file JavaScript -->
    <script src="script.js"></script>
</body>
</html>
